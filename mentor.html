<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor IA Boost</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    .header { background: linear-gradient(135deg, #6b46c1, #7c3aed); padding: 20px; text-align: center; }
    .chat-container { max-width: 800px; margin: 20px auto; padding: 0 15px; height: 70vh; overflow-y: auto; }
    .message { margin: 15px 0; padding: 15px; border-radius: 18px; max-width: 80%; }
    .bot { background: #1e2937; align-self: flex-start; }
    .user { background: #7c3aed; margin-left: auto; }
    .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #1e2937; padding: 15px; display: flex; gap: 10px; }
    input { flex: 1; padding: 15px; border: none; border-radius: 25px; background: #334155; color: white; }
    button { background: #22d3ee; color: black; border: none; padding: 0 25px; border-radius: 25px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 IA Boost Mentor</h1>
    <p>Conectado com IA Real</p>
  </div>

  <div class="chat-container" id="chat"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Pergunte qualquer coisa sobre IA...">
    <button onclick="sendMessage()">Enviar</button>
  </div>

  <script>
    const chat = document.getElementById('chat');

    function addMessage(text, isUser) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user' : 'bot'}`;
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    // Adicione sua mensagem inicial
    addMessage("Olá! Sou seu Mentor IA Boost. Como posso te ajudar hoje?", false);

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, true);
      input.value = '';

      // Simulação enquanto não tem API key
      addMessage("Estou pensando... (Conectando com IA real em breve)", false);

      // Exemplo com Grok ou OpenAI (descomente quando tiver chave)
      /*
      try {
        const response = await fetch('https://api.x.ai/v1/chat/completions', {  // ou api.openai.com
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer SUA_CHAVE_AQUI'
          },
          body: JSON.stringify({
            model: "grok-beta", // ou "gpt-4o-mini"
            messages: [{ role: "user", content: question }]
          })
        });
        const data = await response.json();
        addMessage(data.choices[0].message.content, false);
      } catch(e) {
        addMessage("Erro ao conectar com a IA. Verifique sua chave.", false);
      }
      */
    }
  </script>
</body>
  </html>
