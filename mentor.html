<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor IA Boost</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode.js@1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; margin: 0; background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%); color: #e2e8f0; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #6b46c1, #a855f7); padding: 20px; text-align: center; }
    .chat-container { max-width: 900px; margin: 20px auto; padding: 0 15px; height: calc(100vh - 280px); overflow-y: auto; }
    .message { margin: 18px 0; padding: 16px 20px; border-radius: 20px; max-width: 85%; line-height: 1.5; }
    .bot { background: #1e2937; border-bottom-left-radius: 6px; }
    .user { background: linear-gradient(135deg, #7c3aed, #c026d3); margin-left: auto; border-bottom-right-radius: 6px; }
    .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #1e2937; padding: 15px; display: flex; gap: 12px; box-shadow: 0 -4px 15px rgba(0,0,0,0.3); }
    input { flex: 1; padding: 16px 22px; border: none; border-radius: 30px; background: #334155; color: white; font-size: 1rem; }
    button { background: #22d3ee; color: #0f172a; border: none; padding: 0 28px; border-radius: 30px; font-weight: 600; cursor: pointer; }
    .qr-container { text-align: center; margin: 20px 0; }
    .activity-card { background: #1e2937; padding: 15px; border-radius: 16px; margin: 15px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 IA Boost Mentor</h1>
    <p>Seu mentor inteligente de IA</p>
  </div>

  <div class="chat-container" id="chat"></div>

  <!-- Atividades / Missões -->
  <div style="max-width:900px; margin:20px auto; padding:0 15px;">
    <h2 style="color:#a5b4fc;">📌 Missões Ativas</h2>
    <div class="activity-card">
      <strong>Crie um post viral</strong><br>
      <small>Use IA para gerar conteúdo engajador</small>
    </div>
    <div class="activity-card">
      <strong>Aprenda Prompt Engineering</strong><br>
      <small>Técnicas avançadas de prompting</small>
    </div>
  </div>

  <!-- QR Code -->
  <div class="qr-container">
    <p><strong>Compartilhe este Mentor:</strong></p>
    <div id="qrcode"></div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Pergunte qualquer coisa...">
    <button onclick="sendMessage()">Enviar</button>
  </div>

  <script>
    const chat = document.getElementById('chat');

    function addMessage(text, isUser) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user' : 'bot'}`;
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    addMessage("Olá! Sou seu Mentor IA Boost 🚀\nComo posso te ajudar hoje?", false);

    // Gerar QR Code
    new QRCode(document.getElementById("qrcode"), {
      text: window.location.href,
      width: 180,
      height: 180,
      colorDark: "#ffffff",
      colorLight: "#1e2937"
    });

    function sendMessage() {
      const input = document.getElementById('userInput');
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, true);
      input.value = '';

      addMessage("Estou analisando sua solicitação... Em breve conectarei com IA real!", false);
    }
  </script>
</body>
  </html>
